<div class="admin-module">
  <div class="form-view">
    <div class="form-container">
      <h2 class="form-title">
        <i class="ph ph-calculator" aria-hidden="true"></i>
        <span>{{ 'admin.costEstimator.title' | translate }}</span>
      </h2>

      <section class="form-section">
        <h3 class="form-section-title">{{ 'admin.costEstimator.pickupFees' | translate }}</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="ambulatory-fee">{{ 'admin.costEstimator.ambulatoryFee' | translate }}</label>
            <div class="p-inputgroup">
              <span class="p-inputgroup-addon">$</span>
              <input
                type="text"
                id="ambulatory-fee"
                class="form-control"
                [placeholder]="placeholder"
                name="ambulatory"
                [(ngModel)]="ambulatory"
                [disabled]="!canEdit"
                appCostEstimator
              />
            </div>
          </div>
          <div class="form-group">
            <label for="wheelchair-fee">{{ 'admin.costEstimator.wheelchairFee' | translate }}</label>
            <div class="p-inputgroup">
              <span class="p-inputgroup-addon">$</span>
              <input
                type="text"
                id="wheelchair-fee"
                class="form-control"
                [placeholder]="placeholder"
                name="wheelchair"
                [(ngModel)]="wheelchair"
                [disabled]="!canEdit"
                appCostEstimator
              />
            </div>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h3 class="form-section-title">{{ 'admin.costEstimator.rateStructure' | translate }}</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="fee-per-mile">{{ 'admin.costEstimator.feePerMile' | translate }}</label>
            <div class="p-inputgroup">
              <span class="p-inputgroup-addon">$</span>
              <input
                type="text"
                id="fee-per-mile"
                class="form-control"
                [placeholder]="placeholder"
                name="perMile"
                [(ngModel)]="perMile"
                [disabled]="!canEdit"
                appCostEstimator
              />
            </div>
          </div>
          <div class="form-group">
            <label for="fee-per-hour">{{ 'admin.costEstimator.feePerHour' | translate }}</label>
            <div class="p-inputgroup">
              <span class="p-inputgroup-addon">$</span>
              <input
                type="text"
                id="fee-per-hour"
                class="form-control"
                [placeholder]="placeholder"
                name="perHour"
                [(ngModel)]="perHour"
                [disabled]="!canEdit"
                appCostEstimator
              />
            </div>
          </div>
        </div>
      </section>

      <div class="form-actions">
        <button
          type="button"
          class="btn-primary"
          [disabled]="!canEdit"
          (click)="saveCostEstimator()"
        >
          <i class="ph ph-floppy-disk" aria-hidden="true"></i>
          <span>{{ 'global.save' | translate }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
