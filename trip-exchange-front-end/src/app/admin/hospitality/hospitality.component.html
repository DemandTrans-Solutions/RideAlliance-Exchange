<div class="admin-module">
  <!-- List view -->
  <div id="displayGrid" class="data-view">
    <h2 class="section-title">{{ 'ADMIN.HOSPITALITY.TITLE' | translate }}</h2>

    <div class="action-bar">
      <div class="search-section">
        <span class="p-input-icon-left">
          <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
          <input
            #gb
            type="text"
            class="form-control"
            pInputText
            placeholder="{{ 'COMMON.SEARCH' | translate }}"
            (input)="onFilterGlobal($event)"
            [attr.aria-label]="'COMMON.SEARCH' | translate"
          />
        </span>
      </div>
    </div>

    <div class="data-table-container">
      <p-table
        [value]="filteredServiceList"
        styleClass="p-datatable-sm"
        [rows]="10"
        [paginator]="true"
        [globalFilterFields]="['serviceName']"
        [reorderableColumns]="true"
        sortMode="multiple"
      >
        <ng-template pTemplate="header">
          <tr>
            <th class="column-name">
              {{ 'ADMIN.HOSPITALITY.MEDICAL_CENTER' | translate }}
            </th>
            <th class="column-actions">
              {{ 'ADMIN.HOSPITALITY.ACTIONS' | translate }}
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-rowData>
          <tr>
            <td class="column-name">{{ rowData.serviceName }}</td>
            <td class="column-actions">
              <div class="action-icons">
                <button
                  type="button"
                  class="btn-icon btn-edit"
                  title="{{ 'ADMIN.HOSPITALITY.SHOW_MAP' | translate }}"
                  [attr.aria-label]="'ADMIN.HOSPITALITY.SHOW_MAP' | translate"
                  (click)="editHospitality(rowData)"
                >
                  <i class="ph ph-pencil-simple-line" aria-hidden="true"></i>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>

  <!-- Detail view -->
  <div id="display" class="form-view" style="display: none">
    <div class="form-container">
      <form novalidate #hospitalityForm="ngForm" class="data-form">
        <h3 class="form-title">{{ 'ADMIN.HOSPITALITY.MEDICAL_CENTER' | translate }}</h3>

        <div class="hospitality-detail-grid">
          <div
            class="hospitality-map"
            leaflet
            [leafletOptions]="leafletOptions"
            (leafletMapReady)="onMapReady($event)"
          ></div>

          <div class="hospitality-fields">
            <div class="form-group">
              <label for="hospitality-service-name">{{ 'ADMIN.HOSPITALITY.MEDICAL_CENTER_NAME' | translate }}</label>
              <input
                id="hospitality-service-name"
                type="text"
                class="form-control"
                name="serviceName"
                [(ngModel)]="currentHospitality.serviceName"
                (keypress)="omitSpecialChar($event)"
                required
                aria-required="true"
                [disabled]="role !== 'ROLE_ADMIN'"
              />
            </div>

            <div class="form-group">
              <label for="geoFile">{{ 'ADMIN.HOSPITALITY.UPLOAD_GEO_FILE' | translate }}</label>
              <div class="file-upload-container">
                <i class="ph ph-upload" aria-hidden="true"></i>
                <input
                  type="file"
                  id="geoFile"
                  class="form-control"
                  accept=".kml,.geojson,.json"
                  (change)="onFileSelected($event)"
                  [attr.aria-describedby]="'geoFile-help'"
                />
                <div id="geoFile-help" class="helper-text">
                  {{ 'ADMIN.HOSPITALITY.SUPPORTED_FORMATS' | translate }}
                </div>
              </div>
            </div>

            <div class="form-group" *ngIf="role === 'ROLE_ADMIN'">
              <label for="hospitality-providers">{{ 'ADMIN.HOSPITALITY.SELECT_PROVIDERS' | translate }}</label>
              <p-multiSelect
                inputId="hospitality-providers"
                [options]="providers"
                [(ngModel)]="providerList"
                name="providers"
                defaultLabel="{{ 'ADMIN.HOSPITALITY.SELECT_PROVIDERS' | translate }}"
                (onChange)="addProviders($event.value, $event.itemValue)"
              ></p-multiSelect>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-secondary" type="button" (click)="cancelEdit()">
            {{ 'COMMON.CANCEL' | translate }}
          </button>
          <button
            class="btn-primary"
            type="button"
            *ngIf="role === 'ROLE_ADMIN'"
            [disabled]="hospitalityForm.invalid"
            (click)="saveHospitality()"
          >
            {{ 'COMMON.SAVE' | translate }}
          </button>
          <button
            class="btn-primary"
            type="button"
            *ngIf="role === 'ROLE_PROVIDERADMIN'"
            (click)="mapHospitality()"
          >
            {{ 'ADMIN.HOSPITALITY.MAP_SERVICE_AREA' | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
