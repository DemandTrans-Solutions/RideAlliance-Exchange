<div class="chatbot-container" [class.chatbot-open]="isChatbotOpen">
  <!-- Chatbot Toggle Button -->
  <button
    *ngIf="!isChatbotOpen"
    class="chatbot-toggle"
    (click)="toggleChatbot()"
    pTooltip="Open Chat Assistant"
    tooltipPosition="left"
    aria-label="Open chat assistant"
    type="button">
    <i class="pi pi-comments" aria-hidden="true"></i>
  </button>

  <!-- Chatbot Window -->
  <div class="chatbot-window" *ngIf="isChatbotOpen" [class.minimized]="isMinimized">
    <!-- Header -->
    <div class="chatbot-header">
      <div class="header-content">
        <i class="pi pi-android" aria-hidden="true"></i>
        <span class="title">AI Assistant</span>
        <div class="status-indicator" [class.online]="!isLoading"></div>
      </div>
      <div class="header-actions">
        <button
          class="header-btn"
          (click)="minimizeChat()"
          pTooltip="Minimize"
          [attr.aria-label]="isMinimized ? 'Maximize chat' : 'Minimize chat'"
          type="button">
          <i class="pi" [class.pi-window-minimize]="!isMinimized" [class.pi-window-maximize]="isMinimized" aria-hidden="true"></i>
        </button>
        <button
          class="header-btn"
          (click)="newChat()"
          pTooltip="New Chat"
          aria-label="New chat"
          type="button">
          <i class="pi pi-plus" aria-hidden="true"></i>
        </button>
        <button
          class="header-btn"
          (click)="clearChat()"
          pTooltip="Clear Chat"
          aria-label="Clear chat"
          type="button">
          <i class="pi pi-trash" aria-hidden="true"></i>
        </button>
        <button
          class="header-btn close-btn"
          (click)="closeChat()"
          pTooltip="Close"
          aria-label="Close chat"
          type="button">
          <i class="pi pi-times" aria-hidden="true"></i>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div class="error-container" *ngIf="error" role="alert">
      <p-message
        severity="error"
        [text]="error"
        [closable]="true"
        (onClose)="dismissError()">
      </p-message>
    </div>

    <!-- Chat Body -->
    <div class="chatbot-body" *ngIf="!isMinimized">
      <!-- Messages Container -->
      <div class="messages-container" #messageContainer>
        <div class="messages-list">
          <app-chat-message
            *ngFor="let message of messages; trackBy: trackByMessageId"
            [message]="message">
          </app-chat-message>

          <!-- Typing Indicator -->
          <app-typing-indicator *ngIf="isTyping"></app-typing-indicator>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-container">
        <div class="input-wrapper">
          <input
            #messageInput
            type="text"
            pInputText
            [(ngModel)]="newMessage"
            (keypress)="onKeyPress($event)"
            [disabled]="isLoading"
            placeholder="Type your message here..."
            aria-label="Message"
            class="message-input"
            autocomplete="off">

          <button
            class="send-button"
            (click)="sendMessage()"
            [disabled]="!newMessage.trim() || isLoading"
            aria-label="Send message"
            type="button">
            <i class="pi pi-send" *ngIf="!isLoading" aria-hidden="true"></i>
            <i class="pi pi-spin pi-spinner" *ngIf="isLoading" aria-hidden="true"></i>
          </button>
        </div>

        <!-- Toggle for response type -->
        <fieldset
          class="toggle-container"
          style="margin-top: 8px; display: flex; align-items: center; gap: 12px; border: 0; padding: 0;"
        >
          <legend class="visually-hidden">Response type</legend>
          <label for="chatbot-query-type-text" style="display: flex; align-items: center; gap: 4px;">
            <input id="chatbot-query-type-text" type="radio" name="queryType" [(ngModel)]="selectedQueryType" value="TEXT"> TEXT
          </label>
          <label for="chatbot-query-type-reporting" style="display: flex; align-items: center; gap: 4px;">
            <input id="chatbot-query-type-reporting" type="radio" name="queryType" [(ngModel)]="selectedQueryType" value="REPORTING_CHARTING"> Report/Chart
          </label>
        </fieldset>

        <div class="input-footer">
          <small class="input-hint">Press Enter to send, Shift+Enter for new line</small>
        </div>
      </div>
    </div>
  </div>
</div>
