<!-- Modern Change Password Component - 2025 Edition -->

<main id="main-content" tabindex="-1" class="password-change-container animate-fade-in">
  <div class="card password-card">
    <div class="card-header">
      <h2>{{ 'CHANGE_PASSWORD.TITLE' | translate }}</h2>
    </div>
    <div class="card-body">
      <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label" for="currentPassword">
            {{ 'CHANGE_PASSWORD.CURRENT_PASSWORD' | translate }}
            <span class="required-indicator">*</span>
          </label>
          <input
            type="password"
            id="currentPassword"
            class="form-control"
            formControlName="currentPassword"
            autocomplete="current-password"
            required
            aria-required="true"
            [attr.aria-invalid]="currentPasswordControl?.invalid && currentPasswordControl?.touched"
            [attr.aria-describedby]="currentPasswordControl?.invalid && currentPasswordControl?.touched ? 'currentPassword-error' : null"
            [ngClass]="{'is-invalid': currentPasswordControl?.invalid && currentPasswordControl?.touched}"
          />
          <div
            id="currentPassword-error"
            class="invalid-feedback"
            *ngIf="currentPasswordControl?.invalid && currentPasswordControl?.touched"
          >
            {{ 'CHANGE_PASSWORD.CURRENT_PASSWORD_ERROR' | translate }}
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="newPassword">
            {{ 'CHANGE_PASSWORD.NEW_PASSWORD' | translate }}
            <span class="required-indicator">*</span>
          </label>
          <input
            type="password"
            id="newPassword"
            class="form-control"
            formControlName="newPassword"
            autocomplete="new-password"
            required
            aria-required="true"
            [attr.aria-invalid]="newPasswordControl?.invalid && newPasswordControl?.touched"
            [attr.aria-describedby]="newPasswordControl?.invalid && newPasswordControl?.touched ? 'newPassword-error' : null"
            [ngClass]="{'is-invalid': newPasswordControl?.invalid && newPasswordControl?.touched}"
          />
          <div
            id="newPassword-error"
            class="invalid-feedback"
            *ngIf="newPasswordControl?.invalid && newPasswordControl?.touched"
          >
            {{ 'CHANGE_PASSWORD.NEW_PASSWORD_ERROR' | translate }}
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">
            {{ 'CHANGE_PASSWORD.CONFIRM_PASSWORD' | translate }}
            <span class="required-indicator">*</span>
          </label>
          <input
            type="password"
            id="confirmPassword"
            class="form-control"
            formControlName="confirmPassword"
            autocomplete="new-password"
            required
            aria-required="true"
            [attr.aria-invalid]="(confirmPasswordControl?.invalid || passwordForm.hasError('mismatch')) && confirmPasswordControl?.touched"
            [attr.aria-describedby]="(confirmPasswordControl?.invalid || passwordForm.hasError('mismatch')) && confirmPasswordControl?.touched ? 'confirmPassword-error confirmPassword-mismatch-error' : null"
            [ngClass]="{'is-invalid': (confirmPasswordControl?.invalid || passwordForm.hasError('mismatch')) && confirmPasswordControl?.touched}"
          />
          <div
            id="confirmPassword-error"
            class="invalid-feedback"
            *ngIf="confirmPasswordControl?.invalid && confirmPasswordControl?.touched"
          >
            {{ 'CHANGE_PASSWORD.CONFIRM_PASSWORD_ERROR' | translate }}
          </div>
          <div
            id="confirmPassword-mismatch-error"
            class="invalid-feedback"
            *ngIf="passwordForm.hasError('mismatch') && confirmPasswordControl?.touched"
          >
            {{ 'CHANGE_PASSWORD.PASSWORD_MISMATCH' | translate }}
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" [disabled]="passwordForm.invalid">
            <i class="ph ph-check" aria-hidden="true"></i> {{ 'CHANGE_PASSWORD.BUTTON' | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
